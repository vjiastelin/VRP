services:
  backend:
    build: .
    platform: linux/amd64
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/vrp_db
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=vrp_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
    platform: linux/amd64
    ports:
      - "8083:80"

volumes:
  postgres_data:
